  <circle cx="78" cy="34" r="6" stroke-width="1.5"/>
  <circle cx="78" cy="34" r="2" stroke-width="1"/>
  <!-- Seconda oliva -->
  <circle cx="88" cy="46" r="6" stroke-width="1.5"/>
  <circle cx="88" cy="46" r="2" stroke-width="1"/>
  <!-- Bordo superiore dello stecchino -->
