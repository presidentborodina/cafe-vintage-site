<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" fill="none" stroke="#2C2420" stroke-linecap="round" stroke-linejoin="round">
  <!-- TAVOLO ROTONDO al centro -->
  <!-- Piano del tavolo (ellisse vista dall'alto leggermente inclinata) -->
  <ellipse cx="80" cy="52" rx="28" ry="14" stroke-width="1.8"/>
  <!-- Bordo piano del tavolo (spessore) -->
  <path stroke-width="1.2" d="M52,52 Q52,58 80,60 Q108,58 108,52"/>
  <!-- Gamba centrale del tavolo -->
  <path stroke-width="1.8" d="M80,64 L80,90"/>
  <!-- Disco base -->
  <path stroke-width="1.8" d="M62,90 Q80,94 98,90"/>
  <path stroke-width="1.4" d="M60,93 Q80,97 100,93"/>

  <!-- SEDIA SINISTRA -->
  <!-- schienale: 2 montanti verticali -->
  <path stroke-width="1.8" d="M16,22 L16,55"/>
  <path stroke-width="1.8" d="M38,22 L38,55"/>
  <!-- corrimano schienale -->
  <path stroke-width="1.8" d="M16,22 Q27,18 38,22"/>
  <!-- traversa schienale -->
  <path stroke-width="1.4" d="M16,32 Q27,30 38,32"/>
  <path stroke-width="1.4" d="M16,40 Q27,38 38,40"/>
  <!-- seduta -->
  <path stroke-width="1.8" d="M14,55 Q27,58 40,55"/>
  <path stroke-width="1.2" d="M14,55 L14,60 Q27,63 40,60 L40,55"/>
  <!-- 4 gambe sedia sinistra -->
  <path stroke-width="1.6" d="M16,60 L14,95"/>
  <path stroke-width="1.6" d="M38,60 L40,95"/>
  <path stroke-width="1.4" d="M14,95 Q15,97 18,96"/>
  <path stroke-width="1.4" d="M40,95 Q41,97 38,96"/>
  <!-- traversa gambe -->
  <path stroke-width="1.2" d="M15,80 Q27,82 39,80"/>

  <!-- SEDIA DESTRA -->
  <!-- schienale: 2 montanti verticali -->
  <path stroke-width="1.8" d="M122,22 L122,55"/>
  <path stroke-width="1.8" d="M144,22 L144,55"/>
  <!-- corrimano schienale -->
  <path stroke-width="1.8" d="M122,22 Q133,18 144,22"/>
  <!-- traversa schienale -->
  <path stroke-width="1.4" d="M122,32 Q133,30 144,32"/>
  <path stroke-width="1.4" d="M122,40 Q133,38 144,40"/>
  <!-- seduta -->
  <path stroke-width="1.8" d="M120,55 Q133,58 146,55"/>
  <path stroke-width="1.2" d="M120,55 L120,60 Q133,63 146,60 L146,55"/>
  <!-- 4 gambe sedia destra -->
  <path stroke-width="1.6" d="M122,60 L120,95"/>
  <path stroke-width="1.6" d="M144,60 L146,95"/>
  <path stroke-width="1.4" d="M120,95 Q121,97 124,96"/>
  <path stroke-width="1.4" d="M146,95 Q145,97 142,96"/>
  <!-- traversa gambe -->
  <path stroke-width="1.2" d="M121,80 Q133,82 145,80"/>
</svg>
