  <path stroke-width="1.8" d="M20,80 L18,128"/>
  <!-- Gamba anteriore destra -->
  <path stroke-width="1.8" d="M54,80 L56,128"/>
  <!-- Gamba posteriore sinistra (accorciata per prospettiva) -->
  <path stroke-width="1.4" d="M22,74 L20,118"/>
  <!-- Gamba posteriore destra -->
  <path stroke-width="1.4" d="M52,74 L54,118"/>
  <!-- Traversa bassa tra gambe -->
  <path stroke-width="1.2" d="M19,110 Q37,114 55,110"/>
  <!-- Piedi -->
  <path stroke-width="1.2" d="M16,128 Q17,131 20,130"/>
  <path stroke-width="1.2" d="M56,128 Q57,131 54,130"/>

  <!-- SEDIA DESTRA (vista frontale, speculare) -->
  <!-- Due montanti verticali schienale -->
  <path stroke-width="1.8" d="M148,28 L148,74"/>
  <path stroke-width="1.8" d="M178,28 L178,74"/>
  <!-- Cima schienale curva -->
  <path stroke-width="1.8" d="M148,28 Q163,22 178,28"/>
  <!-- Traversa alta schienale -->
  <path stroke-width="1.4" d="M148,40 Q163,36 178,40"/>
  <!-- Traversa bassa schienale -->
  <path stroke-width="1.4" d="M148,54 Q163,50 178,54"/>
  <!-- Seduta -->
  <path stroke-width="1.8" d="M144,74 Q163,80 182,74"/>
  <!-- Spessore seduta -->
  <path stroke-width="1.2" d="M144,74 L144,80 Q163,86 182,80 L182,74"/>
  <!-- Gamba anteriore sinistra -->
  <path stroke-width="1.8" d="M146,80 L144,128"/>
  <!-- Gamba anteriore destra -->
  <path stroke-width="1.8" d="M180,80 L182,128"/>
  <!-- Gamba posteriore sinistra -->
  <path stroke-width="1.4" d="M148,74 L146,118"/>
  <!-- Gamba posteriore destra -->
  <path stroke-width="1.4" d="M178,74 L180,118"/>
  <!-- Traversa bassa tra gambe -->
  <path stroke-width="1.2" d="M145,110 Q163,114 181,110"/>
  <!-- Piedi -->
  <path stroke-width="1.2" d="M142,128 Q143,131 146,130"/>
