<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" fill="none" stroke="#2C2420" stroke-linecap="round" stroke-linejoin="round">
  <!-- TAVOLO ROTONDO al centro (vista frontale leggermente inclinata) -->
  <!-- Piano del tavolo -->
  <ellipse cx="100" cy="58" rx="34" ry="12" stroke-width="2"/>
  <!-- Bordo spessore piano -->
  <path stroke-width="1.4" d="M66,58 Q66,64 100,66 Q134,64 134,58"/>
  <!-- Gamba centrale -->
  <path stroke-width="2" d="M100,66 L100,108"/>
  <!-- Allargamento alla base della gamba -->
  <path stroke-width="1.6" d="M94,100 Q100,103 106,100"/>
  <!-- Base disco -->
  <ellipse cx="100" cy="112" rx="18" ry="6" stroke-width="2"/>

  <!-- SEDIA SINISTRA (vista frontale) -->
  <!-- Due montanti verticali schienale -->
  <path stroke-width="1.8" d="M22,28 L22,74"/>
  <path stroke-width="1.8" d="M52,28 L52,74"/>
  <!-- Cima schienale curva -->
  <path stroke-width="1.8" d="M22,28 Q37,22 52,28"/>
  <!-- Traversa alta schienale -->
  <path stroke-width="1.4" d="M22,40 Q37,36 52,40"/>
  <!-- Traversa bassa schienale -->
  <path stroke-width="1.4" d="M22,54 Q37,50 52,54"/>
  <!-- Seduta -->
  <path stroke-width="1.8" d="M18,74 Q37,80 56,74"/>
  <!-- Spessore seduta -->
  <path stroke-width="1.2" d="M18,74 L18,80 Q37,86 56,80 L56,74"/>
