<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 130" fill="none" stroke="#2C2420" stroke-linecap="round" stroke-linejoin="round">
  <!-- PIATTO: cerchio esterno -->
  <circle cx="80" cy="68" r="46" stroke-width="2"/>
  <!-- PIATTO: bordo interno -->
  <circle cx="80" cy="68" r="38" stroke-width="1.3"/>
  <!-- PIATTO: incavo centrale -->
  <circle cx="80" cy="68" r="22" stroke-width="1"/>

  <!-- FORCHETTA a sinistra del piatto -->
  <!-- Manico inferiore -->
  <path stroke-width="2" d="M24,120 C24,118 25,115 25,110 L26,90"/>
  <!-- Collo tra manico e denti -->
  <path stroke-width="2" d="M26,90 C26,85 27,80 27,75 L28,65"/>
  <!-- Nervatura manico -->
  <path stroke-width="1" d="M23,105 C24,104 26,104 27,105"/>
  <path stroke-width="1" d="M23,100 C24,99 26,99 27,100"/>
  <!-- 4 denti -->
  <path stroke-width="1.6" d="M25,65 L22,10"/>
  <path stroke-width="1.6" d="M27,65 L25,10"/>
  <path stroke-width="1.6" d="M30,65 L28,10"/>
  <path stroke-width="1.6" d="M32,65 L30,10"/>
  <!-- Ponticello tra collo e denti -->
  <path stroke-width="1.4" d="M22,38 C22,44 25,46 25,50"/>
  <path stroke-width="1.4" d="M25,38 C25,44 27,46 27,50"/>
  <path stroke-width="1.4" d="M28,38 C28,44 29,46 30,50"/>
  <path stroke-width="1.4" d="M30,38 C30,44 31,46 32,50"/>

  <!-- COLTELLO a destra del piatto -->
  <!-- Manico inferiore -->
  <path stroke-width="2" d="M134,120 C134,118 133,115 133,110 L132,90"/>
  <!-- Dettagli manico -->
  <path stroke-width="1" d="M131,108 C132,107 134,107 135,108"/>
  <path stroke-width="1" d="M131,103 C132,102 134,102 135,103"/>
  <path stroke-width="1" d="M131,98 C132,97 134,97 135,98"/>
  <!-- Colletto tra manico e lama -->
  <path stroke-width="1.6" d="M130,90 L136,90"/>
  <!-- Lama: bordo superiore dritto -->
  <path stroke-width="2" d="M136,90 L136,12"/>
  <!-- Lama: bordo inferiore con punta -->
  <path stroke-width="1.6" d="M130,90 C130,70 130,40 136,12"/>
  <!-- Filo della lama -->
  <path stroke-width="1" d="M133,85 C133,65 134,40 136,15"/>
</svg>
